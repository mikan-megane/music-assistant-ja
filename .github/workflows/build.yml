name: build

on:
  push:
    branches: [main]
    paths:
      - ja.json
      - server_ja.json
      - Dockerfile
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream MA server tag to build against (e.g. beta, latest, 2.9.9)"
        required: false
        default: "beta"
      image_tag:
        description: "Tag for the published image (default: latest)"
        required: false
        default: "latest"
  schedule:
    # Rebuild weekly to follow upstream `beta`
    - cron: "0 4 * * 1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream tag
        id: ref
        run: |
          if [ -n "${{ inputs.upstream_tag }}" ]; then
            echo "tag=${{ inputs.upstream_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tag
        id: img
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            # Use the upstream MA version when building on push/schedule
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.img.outputs.tag }}
            type=raw,value=${{ github.sha }}
            type=schedule,pattern=nightly

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MA_SERVER_TAG=${{ steps.ref.outputs.tag }}
          provenance: false
